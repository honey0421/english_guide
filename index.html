<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>트래블링구얼 v2.0 - 해외여행 필수 영어 회화</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Noto Sans KR 및 Poppins 폰트 불러오기 */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700;900&family=Poppins:wght=300;400;500;600;700&display=swap');
    body {
      font-family: 'Noto Sans KR', 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* 가로 스크롤바 감추기 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 플래시 카드 3D 뒤집기 효과 */
    .perspective {
      perspective: 1000px;
    }
    .card-inner {
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card-flipped {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      backface-visibility: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- 네비게이션 헤더 바 -->
  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-md sticky top-0 z-40">

      <!-- 통합 검색 인터페이스 -->
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="영어 문장, 한국어 뜻, 또는 구체적인 상황을 검색한다..." 
          class="w-full pl-10 pr-4 py-3 bg-slate-100 focus:bg-white border-2 border-transparent focus:border-blue-500 rounded-xl text-sm transition outline-none"
        >
      </div>
    </section>

    <!-- 카테고리 슬라이더 네비게이션 -->
    <nav class="mb-6 overflow-x-auto no-scrollbar -mx-4 px-4">
      <div class="flex space-x-2 pb-2" id="categoryTabs">
        <!-- 자바스크립트로 카테고리 목록이 주입된다 -->
      </div>
    </nav>

    <!-- 필터 정보 및 즐겨찾기 스위치 -->
    <div class="flex justify-between items-center mb-4 px-1">
      <p class="text-xs text-slate-500 font-medium">
        조회된 문장: <span id="itemCount" class="text-blue-600 font-bold">0</span>개
      </p>
      <button id="favoriteFilterBtn" class="text-xs font-semibold text-slate-500 hover:text-red-500 flex items-center gap-1 transition">
        <i class="fa-regular fa-heart" id="favFilterIcon"></i>
        <span>북마크 모아보기</span>
      </button>
    </div>

    <!-- 카드 리스트 출력용 컨테이너 -->
    <div id="sentenceContainer" class="grid grid-cols-1 gap-4">
      <!-- 동적으로 상황별 카드 리스트가 주입된다 -->
    </div>

    <!-- 검색 결과 미존재 시 대피용 화면 -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-slate-400">
      <i class="fa-solid fa-folder-open text-5xl mb-4"></i>
      <p class="text-sm font-medium">일치하는 문장 데이터를 찾지 못했다.</p>
      <p class="text-xs mt-1">입력한 철자를 확인하거나 다른 카테고리를 선택해 본다.</p>
    </div>
  </main>

  <!-- 웹앱 하단 풋터 영역 -->
  <footer class="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400 mt-auto">
    <div class="max-w-4xl mx-auto px-4">
      <p>© 2026 트래블링구얼. 모든 필수 회화 데이터 수록 완료.</p>
      <p class="mt-1">인터넷 연결 여부와 상관없이 온전히 사용 가능하다.</p>
    </div>
  </footer>

      {"id": 132, "category": "약국 및 병원", "english": "Can I get a medical certificate for insurance?", "korean": "보험 청구용 의사 진단서를 발급해 주실 수 있나요?", "situation": "귀국 후 보험 청구를 위해 문서 작성을 요청할 때"},

      // [11] 긴급상황 (Emergency)
      {"id": 133, "category": "긴급상황", "english": "Help me, please!", "korean": "도와주세요!", "situation": "주변에 다급히 도움을 청할 때"},
      {"id": 134, "category": "긴급상황", "english": "Call the police, please.", "korean": "경찰을 불러주세요.", "situation": "범죄 상황이나 위험에 직면했을 때"},
      {"id": 135, "category": "긴급상황", "english": "I lost my passport.", "korean": "여권을 잃어버렸습니다.", "situation": "여권을 도난당하거나 분실했을 때"},
      {"id": 136, "category": "긴급상황", "english": "Where is the nearest hospital?", "korean": "가장 가까운 병원은 어디인가요?", "situation": "심각한 외상이나 질병으로 응급실을 찾을 때"},
      {"id": 137, "category": "긴급상황", "english": "I feel very sick.", "korean": "몸이 아주 아픕니다.", "situation": "신체에 극심한 통증이나 이상이 생겼음을 밝힐 때"},
      {"id": 138, "category": "긴급상황", "english": "Someone stole my bag.", "korean": "누가 제 가방을 훔쳐갔습니다.", "situation": "소매치기 피해를 인지하여 구조를 청할 때"},
      {"id": 139, "category": "긴급상황", "english": "Where is the Korean Embassy?", "korean": "한국 대사관은 어디에 있나요?", "situation": "영사 조력이 필요해 대사관 위치를 물어볼 때"},
      {"id": 140, "category": "긴급상황", "english": "Is there someone who speaks Korean?", "korean": "한국어를 할 줄 아는 사람이 있나요?", "situation": "통역인 조력을 다급히 구하고자 할 때"},

      // [12] 스몰토크 및 친목 (Socializing)
      {"id": 141, "category": "스몰토크 및 친목", "english": "Hi, I'm Minjun from Korea. What's your name?", "korean": "안녕하세요, 저는 한국에서 온 민준입니다. 이름이 무엇인가요?", "situation": "만난 현지인이나 타 여행객과 통성명을 나눌 때"},
      {"id": 142, "category": "스몰토크 및 친목", "english": "Where are you from?", "korean": "어디서 오셨나요?", "situation": "상대방의 국적을 물어볼 때"},
      {"id": 143, "category": "스몰토크 및 친목", "english": "How long have you been traveling?", "korean": "여행한 지 얼마나 되셨나요?", "situation": "상대의 여행 일정 스토리를 청해 들을 때"},
      {"id": 144, "category": "스몰토크 및 친목", "english": "What is your favorite place so far?", "korean": "지금까지 여행한 곳 중 가장 마음에 드는 곳은 어디인가요?", "situation": "가장 즐거웠던 장소를 주제로 이야기할 때"},
      {"id": 145, "category": "스몰토크 및 친목", "english": "Are you on Instagram?", "korean": "인스타그램 계정이 있으신가요?", "situation": "지속적으로 소통하기 위해 SNS 연락처를 요청할 때"},
      {"id": 146, "category": "스몰토크 및 친목", "english": "Let's take a selfie together.", "korean": "우리 같이 셀카 찍어요.", "situation": "친해진 기념으로 동반 사진 촬영을 제안할 때"},
      {"id": 147, "category": "스몰토크 및 친목", "english": "What do you do for a living?", "korean": "무슨 일을 하시나요?", "situation": "친해진 상대의 직무 분야나 소속을 대화 주제로 나눌 때"},
      {"id": 148, "category": "스몰토크 및 친목", "english": "Do you have any recommendations for tonight?", "korean": "오늘 저녁에 할 만한 재미있는 액티비티를 추천해 줄 수 있나요?", "situation": "현지의 야간 즐길 거리를 추천해 달라고 할 때"},
      {"id": 149, "category": "스몰토크 및 친목", "english": "It was nice talking to you.", "korean": "이야기 나누어 즐거웠습니다.", "situation": "만남을 파하고 가벼운 작별 인사를 건넬 때"},
      {"id": 150, "category": "스몰토크 및 친목", "english": "Have a safe trip!", "korean": "안전하고 즐거운 여행 되세요!", "situation": "상대방의 순탄한 여정을 소망해주며 헤어질 때"}
    ];

    // 앱 내부 상태 제어 변수군
    let currentCategory = '전체';
    let searchQuery = '';
    let showFavoritesOnly = false;
    let isStudyMode = false;
    let bookmarks = JSON.parse(localStorage.getItem('tb_bookmarks')) || [];
    let activeAudio = null;

    // DOM 선택
    const categoryTabs = document.getElementById('categoryTabs');
    const searchInput = document.getElementById('searchInput');
    const sentenceContainer = document.getElementById('sentenceContainer');
    const itemCount = document.getElementById('itemCount');
    const emptyState = document.getElementById('emptyState');
    const toggleModeBtn = document.getElementById('toggleModeBtn');
    const modeStatusText = document.getElementById('modeStatusText');
    const favoriteFilterBtn = document.getElementById('favoriteFilterBtn');
    const favFilterIcon = document.getElementById('favFilterIcon');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    // 카테고리 전체 목록 (전체 선택 옵션 포함)
    const categories = ['전체', '공항', '호텔', '버스/택시', '기차 및 지하철', '길 찾기', '관광지', '식당', '카페 및 바', '쇼핑', '약국 및 병원', '긴급상황', '스몰토크 및 친목'];

    // 라이프사이클 이닛
    function init() {
      renderCategoryTabs();
      renderSentences();
      setupEventListeners();
    }

    // 카테고리 탭 엘리먼트 가로 렌더링
    function renderCategoryTabs() {
      categoryTabs.innerHTML = '';
      categories.forEach(cat => {
        const button = document.createElement('button');
        button.className = `px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all duration-200 ${
          currentCategory === cat 
            ? 'bg-blue-600 text-white shadow-sm' 
            : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'
        }`;
        button.textContent = cat;
        button.addEventListener('click', () => {
          currentCategory = cat;
          renderCategoryTabs();
          renderSentences();
        });
        categoryTabs.appendChild(button);
      });
    }

    // 카드 렌더링 함수
    function renderSentences() {
      sentenceContainer.innerHTML = '';

      const filtered = dataset.filter(item => {
        const matchesCategory = currentCategory === '전체' || item.category === currentCategory;
        const matchesSearch = searchQuery === '' || 
          item.english.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.korean.includes(searchQuery) ||
          item.situation.includes(searchQuery);
        const matchesFavorite = !showFavoritesOnly || bookmarks.includes(item.id);

        return matchesCategory && matchesSearch && matchesFavorite;
      });

      itemCount.textContent = filtered.length;

      if (filtered.length === 0) {
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        return;
      } else {
        emptyState.classList.add('hidden');
        emptyState.classList.remove('flex');
      }

      filtered.forEach(item => {
        const isFav = bookmarks.includes(item.id);
        const card = document.createElement('div');

        if (isStudyMode) {
          // 뒤집기 학습 모드 UI
          card.className = 'perspective h-40 w-full cursor-pointer';
          card.innerHTML = `
            <div class="card-inner relative w-full h-full duration-500 transform-style" onclick="this.classList.toggle('card-flipped')">
              <!-- 전면 (영어) -->
              <div class="card-front absolute inset-0 bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                  <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md text-[10px] font-bold">${item.category}</span>
                  <div class="flex space-x-2" onclick="event.stopPropagation();">
                    <button onclick="speak('${item.english.replace(/'/g, "\\'")}')" class="text-slate-400 hover:text-blue-600 p-1.5 transition">
                      <i class="fa-solid fa-volume-high text-sm"></i>
                    </button>
                    <button onclick="toggleBookmark(${item.id})" class="p-1.5 transition ${isFav ? 'text-red-500' : 'text-slate-300 hover:text-red-500'}">
                      <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart text-sm"></i>
                    </button>
                  </div>
                </div>
                <div class="text-center py-2">
                  <p class="text-base font-semibold text-slate-800 font-sans tracking-wide px-4">${item.english}</p>
                </div>
                <p class="text-[10px] text-center text-slate-400">카드를 터치하면 해석이 나타난다</p>
              </div>
              <!-- 후면 (해석) -->
              <div class="card-back absolute inset-0 bg-blue-50/50 rounded-2xl p-5 shadow-sm border border-blue-200 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                  <span class="px-2 py-0.5 bg-blue-600 text-white rounded-md text-[10px] font-bold">${item.category}</span>
                  <div class="flex space-x-2" onclick="event.stopPropagation();">
                    <button onclick="toggleBookmark(${item.id})" class="p-1.5 transition ${isFav ? 'text-red-500' : 'text-slate-300 hover:text-red-500'}">
                      <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart text-sm"></i>
                    </button>
                  </div>
                </div>
                <div class="text-center py-1">
                  <p class="text-sm font-bold text-slate-900 mb-1">${item.korean}</p>
                  <p class="text-xs text-slate-500">${item.situation}</p>
                </div>
                <p class="text-[10px] text-center text-blue-500 font-medium">다시 터치하면 원래대로 돌아간다</p>
              </div>
            </div>
          `;
        } else {
          // 목록 기반 일반 모드 UI
          card.className = 'bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:border-blue-200 transition flex flex-col justify-between space-y-3';
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-lg text-[10px] font-bold tracking-wider">${item.category}</span>
              <div class="flex items-center space-x-1">
                <button onclick="speak('${item.english.replace(/'/g, "\\'")}')" class="text-slate-400 hover:text-blue-600 p-2 rounded-lg hover:bg-slate-50 transition" title="TTS 발음 듣기">
                  <i class="fa-solid fa-volume-high text-base"></i>
                </button>
                <button onclick="toggleBookmark(${item.id})" class="p-2 rounded-lg hover:bg-slate-50 transition ${isFav ? 'text-red-500' : 'text-slate-300 hover:text-red-500'}" title="북마크 추가">
                  <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart text-base"></i>
                </button>
              </div>
            </div>
            <div>
              <p class="text-base font-bold text-slate-950 font-sans tracking-wide mb-1 select-all">${item.english}</p>
              <p class="text-sm font-semibold text-slate-700">${item.korean}</p>
            </div>
            <div class="pt-2 border-t border-slate-50 flex items-center gap-1.5 text-xs text-slate-400">
              <i class="fa-regular fa-lightbulb"></i>
              <span>${item.situation}</span>
            </div>
          `;
        }
        sentenceContainer.appendChild(card);
      });
    }

    // ============================================================
    // 음성 합성 기능 (우선순위: ① 안드로이드 네이티브 TTS 브리지
    //                        → ② 브라우저 speechSynthesis
    //                        → ③ 구글 백업 오디오 스트리밍)
    // ============================================================
    function speak(text) {
      // ① 안드로이드 앱(WebView)에서 실행 중이고, 네이티브 TTS 브리지가
      //    주입되어 있다면 그것을 최우선으로 사용한다. (완전 무료, 오프라인 동작)
      if (window.AndroidTTS && typeof window.AndroidTTS.speak === 'function') {
        try {
          window.AndroidTTS.speak(text);
          return;
        } catch (e) {
          console.warn('AndroidTTS 호출 실패, 브라우저 TTS로 대체한다.', e);
          // 실패 시 아래 ②, ③ 단계로 자연스럽게 넘어간다.
        }
      }

      // ② 일반 브라우저(크롬 등)에서 열람 중이라면 Web Speech API를 사용한다.
      if ('speechSynthesis' in window && window.speechSynthesis.speak) {
        try {
          window.speechSynthesis.cancel();

          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = 0.85;

          utterance.onerror = function() {
            speakWithFallback(text);
          };

          window.speechSynthesis.speak(utterance);
          return;
        } catch (e) {
          speakWithFallback(text);
          return;
        }
      }
      speakWithFallback(text);
    }

    // ③ 구글 외부 스트리밍 오디오 지원 최종 백업 TTS
    function speakWithFallback(text) {
      try {
        if (activeAudio) {
          activeAudio.pause();
          activeAudio = null;
        }
        
        const encodedText = encodeURIComponent(text);
        const fallbackUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodedText}`;
        
        activeAudio = new Audio(fallbackUrl);
        activeAudio.play().catch(err => {
          showToast('오디오 장치 허용 또는 화면 한 번 터치 후 재생해 본다.');
        });
      } catch (e) {
        showToast('TTS를 이용할 수 없는 상태이다.');
      }
    }

    // 로컬 스토리지 연계 북마크 스위칭
    function toggleBookmark(id) {
      const index = bookmarks.indexOf(id);
      if (index === -1) {
        bookmarks.push(id);
        showToast('북마크에 등록 완료했다.');
      } else {
        bookmarks.splice(index, 1);
        showToast('북마크를 취소했다.');
      }
      localStorage.setItem('tb_bookmarks', JSON.stringify(bookmarks));
      renderSentences();
    }

    // 알림용 커스텀 토스트 레이어
    let toastTimeout;
    function showToast(message) {
      toastMessage.textContent = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // 사용자 제어 조작 감지 이벤트 연동
    function setupEventListeners() {
      // 실시간 한영 상황 통합 키보드 타이핑 검색
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderSentences();
      });

      // 학습용 플래시 카드 보기 상태 토글링
      toggleModeBtn.addEventListener('click', () => {
        isStudyMode = !isStudyMode;
        if (isStudyMode) {
          toggleModeBtn.classList.add('bg-amber-500', 'hover:bg-amber-600');
          toggleModeBtn.classList.remove('bg-white/20', 'hover:bg-white/30');
          modeStatusText.textContent = '일반 모드 켜기';
          showToast('카드 암기 학습이 켜졌다.');
        } else {
          toggleModeBtn.classList.remove('bg-amber-500', 'hover:bg-amber-600');
          toggleModeBtn.classList.add('bg-white/20', 'hover:bg-white/30');
          modeStatusText.textContent = '학습 모드 켜기';
          showToast('기본 스크롤 탐색 형태로 전환했다.');
        }
        renderSentences();
      });

      // 북마크 모아보기 상태값 스위칭
      favoriteFilterBtn.addEventListener('click', () => {
        showFavoritesOnly = !showFavoritesOnly;
        if (showFavoritesOnly) {
          favFilterIcon.className = 'fa-solid fa-heart text-red-500';
          favoriteFilterBtn.classList.add('text-red-500');
          showToast('즐겨찾기 카드만 출력한다.');
        } else {
          favFilterIcon.className = 'fa-regular fa-heart text-slate-500';
          favoriteFilterBtn.classList.remove('text-red-500');
          showToast('전체 문장 카드를 출력한다.');
        }
        renderSentences();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
